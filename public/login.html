<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuthApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container glassmorphism fade-in">
        <div class="header">
            <h2>Welcome Back</h2>
            <p>Log in to access your dashboard.</p>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" placeholder="johndoe" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="primary-btn" id="login-btn">
                <span>Log In</span>
                <div class="loader hidden" id="login-loader"></div>
            </button>
        </form>

        <div class="footer-links">
            <p>Don't have an account? <a href="/index.html">Sign Up</a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
