<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Netflix Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">
    <header class="netflix-header">
        <h1 class="logo-full">NETFLIX</h1>
    </header>

    <div class="login-wrapper">
        <div class="login-box">
            <h2>Sign In</h2>
            <div id="alert-box" class="alert hidden"></div>

            <form id="login-form">
                <div class="input-col">
                    <input type="text" id="login-username" name="username" placeholder="Username or email" required>
                    <input type="password" id="login-password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="red-btn" id="login-btn">
                    <span>Sign In</span>
                    <div class="loader hidden" id="login-loader"></div>
                </button>

                <div class="remember-row space-between">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="need-help">Need help?</a>
                </div>
            </form>

            <div class="login-footer">
                <p>New to Netflix? <a href="/index.html">Sign up now</a>.</p>
                <p class="captcha-text">This page is protected by Google reCAPTCHA to ensure you're not a bot. <a
                        href="#">Learn more.</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
