<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AuthApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container glassmorphism fade-in">
    <div class="header">
      <h2>Create Account</h2>
      <p>Join us today to get started.</p>
    </div>
    
    <div id="alert-box" class="alert hidden"></div>
    
    <form id="signup-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="johndoe" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
      </div>
      
      <button type="submit" class="primary-btn" id="signup-btn">
        <span>Sign Up</span>
        <div class="loader hidden" id="signup-loader"></div>
      </button>
    </form>
    
    <div class="footer-links">
      <p>Already have an account? <a href="/login.html">Log In</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
